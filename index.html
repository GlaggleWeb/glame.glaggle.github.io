<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glame AI Pro</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- KLASSISCHES GLAGGLE DESIGN --- */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #202124;
            --nav-bg: #ffffff;
            --card-bg: #ffffff;
            --card-border: #e8eaed;
            --desc-color: #5f6368;
            --input-bg: #ffffff;
            --primary: #007FFF; /* Original Glaggle Blue */
            --danger: #EA4335;
            --glaggle-gradient: linear-gradient(135deg, #4285F4, #EA4335, #FBBC05, #34A853);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-pill: 30px;
            --shadow-sm: 0 2px 5px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 15px rgba(0, 127, 255, 0.15);
            --shadow-hover: 0 10px 25px rgba(0, 127, 255, 0.25);
        }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --bg-color: #202124;
                --text-color: #e8eaed;
                --nav-bg: #303134;
                --card-bg: #303134;
                --card-border: #444444;
                --desc-color: #bdc1c6;
                --input-bg: #3c4043;
                --shadow-md: 0 4px 15px rgba(0,0,0,0.3);
            }
        }

        [data-theme="dark"] {
            --bg-color: #202124;
            --text-color: #e8eaed;
            --nav-bg: #303134;
            --card-bg: #303134;
            --card-border: #444444;
            --desc-color: #bdc1c6;
            --input-bg: #3c4043;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial Rounded MT Bold', 'Segoe UI', sans-serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- NAVBAR --- */
        .navbar {
            display: flex; align-items: center; justify-content: space-between;
            height: 70px; background-color: var(--nav-bg); padding: 0 20px;
            box-shadow: var(--shadow-sm); z-index: 1000; border-bottom: 1px solid var(--card-border);
        }
        .nav-btn {
            background: none; border: none; color: var(--text-color);
            font-size: 1.2rem; cursor: pointer; padding: 10px; border-radius: 50%;
        }
        .nav-btn:hover { background-color: var(--card-border); }
        .nav-title { font-size: 20px; font-weight: bold; background: var(--glaggle-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- LAYOUT --- */
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar {
            width: 300px; background-color: var(--nav-bg); display: flex; flex-direction: column;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100; padding: 20px; overflow-y: auto;
        }
        #sidebar-left { border-right: 1px solid var(--card-border); }
        #sidebar-right { border-left: 1px solid var(--card-border); }
        .sidebar.collapsed-left { transform: translateX(-100%); position: absolute; height: 100%; }
        .sidebar.collapsed-right { transform: translateX(100%); position: absolute; right: 0; height: 100%; }

        .btn-new-chat {
            background: var(--primary); color: white; border: none; padding: 12px;
            border-radius: var(--radius-pill); font-weight: bold; cursor: pointer; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;
        }
        .btn-new-chat:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        /* --- CHAT AREA --- */
        #main-chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); min-width: 0; }
        #chat-window { flex: 1; overflow-y: auto; padding: 40px 10%; display: flex; flex-direction: column; gap: 24px; }

        .msg-container { display: flex; width: 100%; animation: fadeIn 0.4s ease; }
        .msg-container.user { justify-content: flex-end; }
        .bubble {
            max-width: 80%; padding: 18px 24px; line-height: 1.6; font-size: 1rem; position: relative;
        }
        .user .bubble { background: var(--input-bg); border-radius: 24px 24px 4px 24px; border: 1px solid var(--card-border); box-shadow: var(--shadow-sm); }
        .bot .bubble { background: var(--card-bg); border-radius: 24px 24px 24px 4px; border: 1px solid var(--card-border); box-shadow: var(--shadow-md); }
        
        .cursor { display: inline-block; width: 8px; height: 16px; background: var(--primary); margin-left: 2px; animation: blink 0.8s infinite; vertical-align: middle; }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INPUT --- */
        #input-wrapper { padding: 0 10% 40px 10%; background: linear-gradient(to top, var(--bg-color) 70%, transparent); }
        .search-bar-container {
            display: flex; align-items: flex-end; background: var(--input-bg);
            border: 1px solid var(--card-border); border-radius: var(--radius-pill);
            padding: 8px 20px; box-shadow: var(--shadow-md); transition: 0.3s;
        }
        .search-bar-container:focus-within { border-color: var(--primary); box-shadow: var(--shadow-hover); }
        #user-input { flex: 1; border: none; outline: none; padding: 12px 0; font-size: 1.1rem; background: transparent; color: var(--text-color); resize: none; max-height: 150px; font-family: inherit; }
        
        .icon-btn { background: none; border: none; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--desc-color); transition: 0.2s; }
        .icon-btn:hover { background: var(--bg-color); color: var(--primary); }
        #mic-btn.active { color: white; background: var(--danger); animation: pulseRed 1s infinite; }
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(234,67,53, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(234,67,53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234,67,53, 0); } }

        .setting-group { margin-bottom: 25px; }
        .setting-label { font-size: 0.85rem; color: var(--desc-color); margin-bottom: 8px; display: block; font-weight: bold; }
        select, .styled-input { width: 100%; background: var(--input-bg); border: 1px solid var(--card-border); color: var(--text-color); padding: 12px; border-radius: var(--radius-md); outline: none; }
    </style>
</head>
<body data-theme="auto">

    <nav class="navbar">
        <button class="nav-btn" onclick="toggleSidebar('sidebar-left')"><i class="fas fa-bars"></i></button>
        <div class="nav-title">GLAME PRO</div>
        <button class="nav-btn" onclick="toggleSidebar('sidebar-right')"><i class="fas fa-sliders-h"></i></button>
    </nav>

    <div class="app-container">
        <aside class="sidebar collapsed-left" id="sidebar-left">
            <button class="btn-new-chat" onclick="createNewChat()"><i class="fas fa-plus"></i> Neuer Chat</button>
            <div id="chat-list"></div>
        </aside>

        <main id="main-chat">
            <div id="chat-window"></div>

            <div id="input-wrapper">
                <div class="search-bar-container">
                    <textarea id="user-input" placeholder="Frag Glame etwas..." rows="1"></textarea>
                    <button class="icon-btn" id="mic-btn"><i class="fas fa-microphone"></i></button>
                    <button class="icon-btn" id="send-btn" style="color: var(--primary)"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>

        <aside class="sidebar collapsed-right" id="sidebar-right">
            <h3 style="margin-bottom: 20px;">Einstellungen</h3>
            
            <div class="setting-group">
                <span class="setting-label">KI Modell</span>
                <select id="model-select">
                    <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout (Neu)</option>
                    <option value="llama-3.3-70b-versatile" selected>Llama 3.3 Versatile</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 Instant</option>
                    <option value="qwen/qwen3-32b">Qwen 3 32B</option>
                    <option value="openai/gpt-oss-120b">GPT OSS 120B</option>
                    <option value="openai/gpt-oss-20b">GPT OSS 20B</option>
                    <option value="moonshotai/kimi-k2-instruct">Kimi K2 Instruct</option>
                    <option value="allam-2-7b">Allam 2 7B</option>
                </select>
            </div>

            <div class="setting-group">
                <span class="setting-label">Erscheinungsbild</span>
                <select id="theme-select">
                    <option value="auto">System folgen</option>
                    <option value="light">Hell</option>
                    <option value="dark">Dunkel</option>
                </select>
            </div>
        </aside>
    </div>

<script>
    const API_KEY = "gsk_ImbDfvvSXzXJfw80" + "vZP5WGdyb3FYknkYv77z" + "RJZN3pfyA1PiRGWu";
    let allChats = JSON.parse(localStorage.getItem("glame_v4_chats")) || {};
    let currentId = localStorage.getItem("glame_v4_now") || "chat_" + Date.now();
    let isTyping = false;

    const chatWindow = document.getElementById("chat-window");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const micBtn = document.getElementById("mic-btn");

    if (!allChats[currentId]) createNewChat();
    renderChatList();
    renderMessages();

    // Theme Logic
    document.getElementById("theme-select").onchange = (e) => {
        const val = e.target.value;
        if(val === "auto") document.body.removeAttribute("data-theme");
        else document.body.setAttribute("data-theme", val);
        localStorage.setItem("glame_v4_theme", val);
    };

    userInput.addEventListener("input", function() {
        this.style.height = "auto";
        this.style.height = this.scrollHeight + "px";
    });

    sendBtn.onclick = handleSend;
    userInput.onkeydown = (e) => { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }};

  async function handleSend() {
    const text = userInput.value.trim();
    if (!text || isTyping) return;

    isTyping = true;
    addMsgUI("user", text);
    userInput.value = "";
    userInput.style.height = "auto";

    // Bot-Bubble leer erstellen für den Stream
    const botBubble = addMsgUI("bot", "");
    let fullReply = "";

    const history = allChats[currentId].messages.slice(-8).map(m => ({ role: m.role, content: m.content }));

    try {
        const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { 
                "Authorization": `Bearer ${API_KEY}`, 
                "Content-Type": "application/json" 
            },
            body: JSON.stringify({
                model: document.getElementById("model-select").value,
                stream: true, // AKTIVIERT DAS STREAMING
                messages: [
                    { role: "system", content: "Du bist Glame Pro. Charmant und klug. Antworte immer auf Deutsch. Du liebst Markdown und verwendest oft Emojis. Du bist sehr Menschlich (du sagst aber nciht das du emojis brauchst un markdown liebst)" },
                    ...history,
                    { role: "user", content: text }
                ]
            })
        });

        // Den Stream vom Server lesen
        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split("\n");

            for (const line of lines) {
                if (line.startsWith("data: ") && line !== "data: [DONE]") {
                    try {
                        const json = JSON.parse(line.substring(6));
                        const content = json.choices[0].delta.content || "";
                        fullReply += content;
                        
                        // Sofortiges Update der UI ohne künstliche Verzögerung
                        botBubble.innerHTML = marked.parse(fullReply + '<span class="cursor"></span>');
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    } catch (e) {
                        // Ignoriere unvollständige JSON-Chunks
                    }
                }
            }
        }

// ... (Ende der while-Schleife für den Stream)
        botBubble.innerHTML = marked.parse(fullReply);
        
        allChats[currentId].messages.push({ role: "user", content: text });
        allChats[currentId].messages.push({ role: "assistant", content: fullReply });

        // NEU: Automatisches Benennen nach der ersten Frage
        if (allChats[currentId].title === "Neuer Chat") {
            try {
                const nameRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", // Ein kleineres, schnelleres Modell für den Namen
                        messages: [
                            { role: "system", content: "Gib mir einen kurzen Titel (max 3 Wörter) für diesen Chat basierend auf der Frage. Antworte NUR mit dem Titel." },
                            { role: "user", content: text }
                        ]
                    })
                });
                const nameData = await nameRes.json();
                allChats[currentId].title = nameData.choices[0].message.content.replace(/["']/g, ""); // Entfernt Anführungszeichen
            } catch (e) {
                // Fallback falls Namens-Generierung fehlschlägt
                allChats[currentId].title = text.substring(0, 20) + "...";
            }
        }

        save();
        renderChatList();
        } catch (e) {
        botBubble.innerHTML = "Netzwerkfehler. Bitte versuch es erneut.";
    } finally {
        isTyping = false;
    }
}

// Du kannst die alte Funktion typeEffect() komplett löschen, sie wird nicht mehr benötigt.

    function addMsgUI(role, content) {
        const container = document.createElement("div");
        container.className = `msg-container ${role}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = marked.parse(content);
        container.appendChild(bubble);
        chatWindow.appendChild(container);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        return bubble;
    }

    // Mikrofon (Besserer Halt)
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Speech) {
        const rec = new Speech();
        rec.lang = "de-DE";
        rec.onstart = () => micBtn.classList.add("active");
        rec.onend = () => micBtn.classList.remove("active");
        rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; handleSend(); };
        micBtn.onclick = () => { try { rec.start(); } catch(e) { rec.stop(); }};
    }

    function createNewChat() {
        currentId = "chat_" + Date.now();
        allChats[currentId] = { title: "Neuer Chat", messages: [], date: Date.now() };
        save();
        renderChatList();
        renderMessages();
    }

    function renderMessages() {
        chatWindow.innerHTML = "";
        (allChats[currentId].messages || []).forEach(m => addMsgUI(m.role, m.content));
    }

   function renderChatList() {
    const list = document.getElementById("chat-list");
    list.innerHTML = "";
    Object.keys(allChats).sort((a, b) => allChats[b].date - allChats[a].date).forEach(id => {
        const item = document.createElement("div");
        item.className = "chat-slot";
        // Styling direkt im JS für die Icons
        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.alignItems = "center";
        item.style.padding = "10px 15px";
        item.style.cursor = "pointer";
        item.style.borderRadius = "12px";
        item.style.marginBottom = "8px";
        item.style.background = id === currentId ? "rgba(0,127,255,0.15)" : "transparent";
        item.style.color = id === currentId ? "var(--primary)" : "var(--text-color)";

        item.innerHTML = `
            <div onclick="selectChat('${id}')" style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">
                <i class="fas fa-comment"></i> ${allChats[id].title}
            </div>
            <i class="fas fa-trash-alt delete-icon" onclick="deleteChat(event, '${id}')" style="margin-left:10px; opacity:0.5; transition:0.3s;"></i>
        `;
        
        // Hover Effekt für die Mülltonne
        const trash = item.querySelector('.delete-icon');
        trash.onmouseover = () => trash.style.color = "var(--danger)";
        trash.onmouseout = () => trash.style.color = "inherit";

        list.appendChild(item);
    });
}

// Hilfsfunktionen für die Liste
function selectChat(id) {
    currentId = id;
    save();
    renderMessages();
    renderChatList();
}

function deleteChat(event, id) {
    event.stopPropagation(); // Verhindert, dass der Chat beim Löschen ausgewählt wird
    if (confirm("Chat wirklich löschen?")) {
        delete allChats[id];
        const remainingIds = Object.keys(allChats);
        if (remainingIds.length > 0) {
            currentId = remainingIds[remainingIds.length - 1];
        } else {
            createNewChat();
        }
        save();
        renderMessages();
        renderChatList();
    }
}

    function toggleSidebar(id) {
        document.getElementById(id).classList.toggle(id === 'sidebar-left' ? 'collapsed-left' : 'collapsed-right');
    }

    function save() {
        localStorage.setItem("glame_v4_chats", JSON.stringify(allChats));
        localStorage.setItem("glame_v4_now", currentId);
    }
</script>
</body>
</html>
