<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glame AI Pro</title>

    <link rel="icon" type="image/png" href="glagglesonne.png">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-dark: #0f172a;
            --panel-dark: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --user-bubble: #334155;
            --bot-bubble: #1e293b;
            --accent: #38bdf8;
        }

        * { box-sizing: border-box; transition: all 0.1s ease; }

        body {
            background-color: var(--bg-dark);
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background: #020617;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
            font-weight: 800;
            font-size: 1.2rem;
            color: white;
        }

        #new-chat-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-slot {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-slot:hover { background: rgba(255,255,255,0.05); }
        .chat-slot.active { background: rgba(14, 165, 233, 0.1); color: var(--primary); border: 1px solid var(--primary); }

        /* Main */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #chat-header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #chat-window {
            flex: 1;
            padding: 40px 15%;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .msg-container { display: flex; width: 100%; position: relative; }
        .msg-container.user { justify-content: flex-end; }
        .msg-container.bot { justify-content: flex-start; }

        .bubble {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }

        .user .bubble { background: var(--user-bubble); color: white; border-bottom-right-radius: 4px; }
        .bot .bubble { background: var(--bot-bubble); color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

        /* Read Aloud Button */
        .speak-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 8px;
            margin-top: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            width: fit-content;
        }

        .speak-btn:hover { background: rgba(255,255,255,0.1); color: white; }

        /* Typewriter Cursor Effect */
        .typing::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--primary);
            margin-left: 4px;
            animation: blink 0.5s infinite;
            vertical-align: middle;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Input Area */
        #input-area-wrapper { padding: 20px 15% 40px 15%; }

        #input-container {
            background: var(--panel-dark);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 16px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border-radius: 50%;
        }

        .icon-btn:hover { color: white; background: rgba(255,255,255,0.05); }
        #mic-btn.listening { color: #ef4444; background: rgba(239, 68, 68, 0.15); animation: pulse 1.5s infinite; }
        #send-btn { color: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { transform: scale(1.15); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-bolt" style="color: var(--primary);"></i>
            <span>GLAME PRO</span>
        </div>
        <button id="new-chat-btn">Neuer Chat</button>
        <div id="chat-list"></div>
    </aside>

    <main id="main-container">
        <header id="chat-header">
            <div style="font-size: 12px; color: var(--text-muted); background: rgba(255,255,255,0.03); padding: 5px 12px; border-radius: 20px;">
                <i class="fas fa-microchip" style="margin-right: 5px;"></i> Llama 3.3 Turbo Voice
            </div>
            <div style="width: 35px; height: 35px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">U</div>
        </header>

        <div id="chat-window"></div>

        <div id="input-area-wrapper">
            <div id="input-container">
                <button class="icon-btn" id="mic-btn" title="Spracheingabe starten">
                    <i class="fas fa-microphone"></i>
                </button>
                <input type="text" id="user-input" placeholder="Nachricht eingeben oder sprechen..." autocomplete="off">
                <button class="icon-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

<script>
    const lKey = "gsk_ImbDfvvSXzXJfw80" + "vZP5WGdyb3FYknkYv77z" + "RJZN3pfyA1PiRGWu";

    let allChats = JSON.parse(localStorage.getItem("glame_chats_v2")) || {};
    let currentChatId = localStorage.getItem("glame_active_id") || "chat_" + Date.now();
    let isProcessing = false; // Sperre gegen doppeltes Senden

    const chatWindow = document.getElementById("chat-window");
    const userInput = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const micBtn = document.getElementById("mic-btn");
    const chatList = document.getElementById("chat-list");

    // --- VOICE OUTPUT (TTS) ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const cleanText = text.replace(/[*#_`]/g, '');
        const utterance = new SpeechSynthesisUtterance(cleanText);
        
        const voices = window.speechSynthesis.getVoices();
        const deVoice = voices.find(v => v.lang.startsWith('de') && v.name.includes('Google')) || voices.find(v => v.lang.startsWith('de'));
        
        if (deVoice) utterance.voice = deVoice;
        utterance.lang = 'de-DE';
        utterance.rate = 1.05; 
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // --- TYPEWRITER EFFECT ---
    async function typeWriter(element, text) {
        element.classList.add("typing");
        let i = 0;
        const speed = 5; // Noch schneller
        
        return new Promise(resolve => {
            function type() {
                if (i < text.length) {
                    element.innerHTML = marked.parse(text.substring(0, i + 1));
                    i += 2; // Sprung in 2er Schritten für Speed
                    if (i > text.length) i = text.length;
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                    setTimeout(type, speed);
                } else {
                    element.classList.remove("typing");
                    resolve();
                }
            }
            type();
        });
    }

    // --- SPRACHERKENNUNG SETUP ---
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isListening = false;
    let wasVoiceRequest = false; 
    let autoSendTimer = null;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'de-DE';
        recognition.interimResults = true;
        recognition.continuous = true;

        recognition.onstart = () => {
            isListening = true;
            micBtn.classList.add("listening");
            userInput.placeholder = "Ich höre zu...";
        };
        
        recognition.onend = () => {
            isListening = false;
            micBtn.classList.remove("listening");
            userInput.placeholder = "Nachricht eingeben oder sprechen...";
        };

        recognition.onresult = (event) => {
            const transcript = Array.from(event.results)
                .map(result => result[0].transcript)
                .join('');
            
            userInput.value = transcript;

            // Timer zurücksetzen
            clearTimeout(autoSendTimer);
            if (!isProcessing) {
                autoSendTimer = setTimeout(() => {
                    if (userInput.value.trim().length > 0 && isListening) {
                        wasVoiceRequest = true; // Explizit hier setzen
                        recognition.stop();
                        handleSend();
                    }
                }, 1300);
            }
        };

        recognition.onerror = () => {
            isListening = false;
            micBtn.classList.remove("listening");
        };
    }

    // --- INITIALISIERUNG ---
    window.onload = () => {
        if (!allChats[currentChatId]) {
            allChats[currentChatId] = [];
        }
        renderChatList();
        renderMessages();
    };

    function save() {
        localStorage.setItem("glame_chats_v2", JSON.stringify(allChats));
        localStorage.setItem("glame_active_id", currentChatId);
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        clearTimeout(autoSendTimer);
        window.speechSynthesis.cancel();
        
        const isVoiceInput = wasVoiceRequest; 
        wasVoiceRequest = false; // Reset für den nächsten Turn

        allChats[currentChatId].push({ role: "user", content: text });
        renderMessages();
        userInput.value = "";

        const tempId = "bot-" + Date.now();
        const container = document.createElement("div");
        container.className = "msg-container bot";
        container.innerHTML = `<div class="bubble typing" id="${tempId}">...</div>`;
        chatWindow.appendChild(container);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const history = (allChats[currentChatId] || []).slice(-8);
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${lKey}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        { role: "system", content: "Du bist Glame Pro. Der feundliche KI Chatbot von Glaggle.ch. Antworte immer auf Deutsch, sei charmant und präzise. Du antwortest strukturiert sei nett un hilfreich!" },
                        ...history.map(m => ({ role: m.role, content: m.content }))
                    ]
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            const botBubble = document.getElementById(tempId);
            botBubble.innerHTML = "";
            
            if (isVoiceInput) {
                speak(reply);
            }
            
            await typeWriter(botBubble, reply);
            
            const speakBtn = document.createElement("button");
            speakBtn.className = "speak-btn";
            speakBtn.innerHTML = `<i class="fas fa-volume-up"></i> Vorlesen`;
            speakBtn.onclick = () => speak(reply);
            botBubble.appendChild(speakBtn);
            
            allChats[currentChatId].push({ role: "assistant", content: reply });
            save();
            renderChatList();
        } catch (err) {
            document.getElementById(tempId).innerText = "Fehler bei der Verbindung.";
        } finally {
            isProcessing = false;
        }
    }

    function renderMessages() {
        chatWindow.innerHTML = "";
        const messages = allChats[currentChatId] || [];
        if (messages.length === 0) {
            chatWindow.innerHTML = `<div class="msg-container bot"><div class="bubble">Hallo! Ich bin Glame Pro Turbo. Spreche oder schreibe mir einfach. 🚀</div></div>`;
            return;
        }
        messages.forEach((msg) => {
            const container = document.createElement("div");
            container.className = `msg-container ${msg.role === 'user' ? 'user' : 'bot'}`;
            const bubble = document.createElement("div");
            bubble.className = "bubble";
            bubble.innerHTML = msg.role === 'assistant' ? marked.parse(msg.content) : msg.content;
            
            if (msg.role === 'assistant') {
                const btn = document.createElement("button");
                btn.className = "speak-btn";
                btn.innerHTML = `<i class="fas fa-volume-up"></i> Vorlesen`;
                btn.onclick = () => speak(msg.content);
                bubble.appendChild(btn);
            }
            
            container.appendChild(bubble);
            chatWindow.appendChild(container);
        });
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function renderChatList() {
        chatList.innerHTML = "";
        Object.keys(allChats).sort((a,b) => b.split("_")[1] - a.split("_")[1]).forEach(id => {
            const slot = document.createElement("div");
            slot.className = `chat-slot ${id === currentChatId ? 'active' : ''}`;
            const firstMsg = allChats[id].find(m => m.role === 'user');
            slot.innerText = firstMsg ? firstMsg.content.substring(0, 25) + "..." : "Turbo Chat";
            slot.onclick = () => {
                window.speechSynthesis.cancel();
                currentChatId = id;
                save();
                renderChatList();
                renderMessages();
            };
            chatList.appendChild(slot);
        });
    }

    document.getElementById("new-chat-btn").onclick = () => {
        window.speechSynthesis.cancel();
        currentChatId = "chat_" + Date.now();
        allChats[currentChatId] = [];
        save();
        renderChatList();
        renderMessages();
    };

    micBtn.onclick = () => {
        if (!recognition) return;
        if (isListening) {
            recognition.stop();
        } else {
            wasVoiceRequest = true; 
            recognition.start();
        }
    };

    userInput.onkeypress = (e) => { 
        if (e.key === "Enter") {
            wasVoiceRequest = false; 
            handleSend();
        }
    };
    sendBtn.onclick = () => {
        wasVoiceRequest = false;
        handleSend();
    };

    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
</script>
</body>
</html>
